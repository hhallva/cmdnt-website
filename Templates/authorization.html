<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Учет номерного фонда общежития</title>
    <link rel="icon" href="/cmdnt.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="decoration"></div>
    <div class="decoration"></div>
    <div class="decoration"></div>
    
    <div class="container">
        <div class="content">
            <div class="logo">
                <i class="bi bi-door-open"></i>
            </div>
            <h1>Вход в систему</h1>
            <p class="subtitle">
                Учет номерного фонда общежития<br>
                Войдите в систему для управления данными
            </p>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Логин</label>
                    <div class="input-icon">
                        <i class="bi bi-person"></i>
                        <input type="text" id="username" class="form-control" placeholder="Введите логин" required>
                    </div>
                    <div class="error-message" id="usernameError">Пожалуйста, введите логин</div>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Пароль (Добавить скрытие отображение пароля)</label>
                    <div class="input-icon">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Введите пароль" required>
                    </div>
                    <div class="error-message" id="passwordError">Пожалуйста, введите пароль</div>
                </div>
                
                <button type="submit"  class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Войти
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Простая валидация
            let isValid = true;
            
            if (!username) {
                document.getElementById('usernameError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('usernameError').style.display = 'none';
            }
            
            if (!password) {
                document.getElementById('passwordError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('passwordError').style.display = 'none';
            }
            
            if (isValid) {
                // Здесь будет логика аутентификации
                console.log('Попытка входа:', { username, password, remember });
                
                // Имитация успешного входа
                
                // В реальном приложении здесь будет отправка данных на сервер
                // и перенаправление на главную страницу
            }
        });
        
        // Добавим немного анимации при фокусе на поля
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
