name: Deploy CMDNT Website

on:
  push:
    branches: [ main ]
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true                            # удаляет ненужные файлы (например, артефакты предыдущих запусков)
          
      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "."
          target: "/var/www/cmdnt.hhallva.ru" 
          rm: true 
          strip_components: 1                   # убирает лишний уровень вложенности (если был)
          debug: false                          # отключает подробный лог (меньше шума)

      - name: Create .env file from secrets
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/cmdnt.hhallva.ru
            cat > .env << EOF
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ASPNETCORE_ENVIRONMENT=${{ secrets.ASPNETCORE_ENVIRONMENT }}
            JWT_KEY=${{ secrets.JWT_KEY }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            EOF
            echo ".env file created successfully"
            # Проверяем что файл создан (без показа содержимого в логах)
            ls -la .env

      - name: Rebuild and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/cmdnt.hhallva.ru
            docker compose down
            docker compose up -d --build
            
      - name: Reload Caddy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: sudo systemctl reload caddy
          
      - name: Verify website is up
        run: sleep 5 && curl --fail https://cmdnt.hhallva.ru
